version: "3.9"
services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build:
      context: .
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MONGO_URI=mongodb://mongo:27017/smart-leads
      - JWT_ACCESS_SECRET=change_me_please_use_long_random
      - JWT_ACCESS_TTL=15m
      - BCRYPT_SALT_ROUNDS=12
      - CORS_ORIGIN=http://localhost:5173
      - LOG_LEVEL=info
    ports:
      - "4000:4000"
    depends_on:
      - mongo

volumes:
  mongo-data:
